<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админ-панель — Душанбе Текстиль</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .admin-header h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
    }

    .admin-header a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 4px;
      transition: color 0.2s, border-color 0.2s;
    }
    .admin-header a:hover { color: var(--accent); border-color: var(--accent); }

    /* LOGIN */
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px;
      max-width: 400px;
      margin: 80px auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .login-box h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .login-box input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .login-box input:focus { outline: none; border-color: var(--accent); }
    .login-error { color: #e57373; font-size: 0.85rem; display: none; }
    .login-error.show { display: block; }

    /* STATS CARDS */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
    }

    .stat-card .num {
      font-family: var(--font-display);
      font-size: 2.2rem;
      color: var(--accent);
      font-weight: bold;
    }

    .stat-card p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    /* TABLE */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .table-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .badge {
      background: rgba(200,147,90,0.15);
      color: var(--accent);
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 100px;
    }

    .orders-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .orders-table th {
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .orders-table td {
      padding: 14px 16px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .orders-table tr:last-child td { border-bottom: none; }
    .orders-table tr:hover td { background: rgba(255,255,255,0.02); }

    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .status.new { background: rgba(200,147,90,0.15); color: var(--accent); }
    .status.done { background: rgba(129,199,132,0.15); color: #81c784; }
    .status.pending { background: rgba(100,150,200,0.15); color: #90caf9; }

    .btn-done {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-done:hover { border-color: #81c784; color: #81c784; }

    /* HIDDEN/SHOWN */
    #loginSection { display: block; }
    #adminPanel { display: none; }

    @media (max-width: 600px) {
      .stat-cards { grid-template-columns: 1fr; }
      .orders-table th:nth-child(4),
      .orders-table td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginSection">
    <div class="login-box">
      <h2>🔐 Вход в панель</h2>
      <p style="color:var(--text-muted);font-size:0.9rem;">Только для администраторов</p>
      <input type="text" id="loginInput" placeholder="Логин" />
      <input type="password" id="passInput" placeholder="Пароль" />
      <span class="login-error" id="loginError">Неверный логин или пароль</span>
      <button class="btn-primary" onclick="login()">Войти</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <div class="admin-wrapper">
      <div class="admin-header">
        <h1>Админ-панель</h1>
        <a href="index.html">← На сайт</a>
      </div>

      <!-- STAT CARDS -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="num" id="totalCount">0</div>
          <p>Всего заявок</p>
        </div>
        <div class="stat-card">
          <div class="num" id="newCount">0</div>
          <p>Новых</p>
        </div>
        <div class="stat-card">
          <div class="num" id="doneCount">0</div>
          <p>Обработано</p>
        </div>
      </div>

      <!-- ORDERS TABLE -->
      <div class="table-header">
        <h2>Заявки от клиентов</h2>
        <span class="badge" id="badgeCount">0 заявок</span>
      </div>

      <table class="orders-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Товар / Сообщение</th>
            <th>Статус</th>
            <th>Действие</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // ===== DEMO DATA =====
    const orders = [
      { id: 1, name: 'Алишер Каримов', phone: '+992 900 123 456', product: 'Хлопок натуральный', status: 'new' },
      { id: 2, name: 'Мадина Рахимова', phone: '+992 550 789 012', product: 'Постельное бельё', status: 'done' },
      { id: 3, name: 'Бахром Усманов', phone: '+992 370 345 678', product: 'Нить хлопковая №40', status: 'pending' },
      { id: 4, name: 'Зарина Назарова', phone: '+992 900 567 890', product: 'Лён премиум', status: 'new' },
      { id: 5, name: 'Фируз Саидов', phone: '+992 550 234 567', product: 'Шёлк таджикский', status: 'new' },
    ];

    // ===== LOGIN =====
    function login() {
      const login = document.getElementById('loginInput').value;
      const pass = document.getElementById('passInput').value;
      const error = document.getElementById('loginError');

      if (login === 'admin' && pass === '1234') {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        renderOrders();
      } else {
        error.classList.add('show');
      }
    }

    // Enter key login
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });

    // ===== RENDER TABLE =====
    function renderOrders() {
      const tbody = document.getElementById('ordersBody');
      tbody.innerHTML = '';

      const statusLabels = { new: 'Новая', done: 'Выполнена', pending: 'В работе' };

      orders.forEach(order => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:var(--text-muted)">${order.id}</td>
          <td>${order.name}</td>
          <td>${order.phone}</td>
          <td>${order.product}</td>
          <td><span class="status ${order.status}">${statusLabels[order.status]}</span></td>
          <td>
            ${order.status !== 'done'
              ? `<button class="btn-done" onclick="markDone(${order.id})">✓ Готово</button>`
              : `<span style="color:var(--text-muted);font-size:0.8rem">—</span>`
            }
          </td>
        `;
        tbody.appendChild(tr);
      });

      updateStats();
    }

    // ===== MARK AS DONE =====
    function markDone(id) {
      const order = orders.find(o => o.id === id);
      if (order) order.status = 'done';
      renderOrders();
    }

    // ===== UPDATE STATS =====
    function updateStats() {
      const total = orders.length;
      const newOnes = orders.filter(o => o.status === 'new').length;
      const done = orders.filter(o => o.status === 'done').length;

      document.getElementById('totalCount').textContent = total;
      document.getElementById('newCount').textContent = newOnes;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('badgeCount').textContent = total + ' заявок';
    }
  </script>

</body>
</html>
